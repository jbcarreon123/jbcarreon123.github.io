<!DOCTYPE html>
<html>
	<head>
	<title>WebVideoPlayer</title>
		<style>
			html {
			background-color: black;
			overflow: hidden;
			}
			.img1 {
			position: absolute;
			left: 475px;
			}
			.text1 {
			position: absolute;
			color: #FFFFFF;
			font-family: "Segoe UI Variable SemiBold", "Segoe UI", Arial, sans-serif;
			}
			.btn1 {
			position: absolute;
			top: 150px;
			}
			.image1 {
				width: 15360px
				height: 8640px
			}
			.noscript {
				position: sticky;
			}
			.button {
			font-family: "Times New Roman", serif;
			background-color: #000000; /* Green */
			border: none;
			color: white;
			padding: 16px 32px;
			text-align: center;
			text-decoration: none;
			display: inline-block;
			font-size: 16px;
			margin: 4px 2px;
			transition-duration: 0.4s;
			cursor: pointer;
			}
			.button:hover {
			background-color: green; /* Green */
			color: white;
			}
			.button3:hover {
			background-color: RED; /* Green */
			color: white;
			}
			.button:clicked {
			background-color: black;
			color: white;
			}
			.hidden{
			display: none;
			}
			
		</style>
		<body>
			<noscript><div class="noscript" id="noscript"><h2>It looks like JavaScript is disabled or not supported in your browser.</h2></div></noscript>
		<script src="https://www.youtube.com/iframe_api"></script>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
		<script src="https://code.jquery.com/ui/1.11.3/jquery-ui.min.js"></script>
			<div class="text1">
				<h1>Video Title</h1>
				<h3>Video Author</h3>
			</div>
			<div class="img1">
				<img id="image1" class="image image1" src="https://github.com/jbcarreon123/badUIbattles-mySubmissions/raw/main/imageS/VidImg1.png" alt="PlayerPlay1">
				<iframe id="ytvid" class="ytvid"
        width="15360" height="8640"
        src="https://www.youtube.com/embed/xvFZjo5PgG0?enablejsapi=1&disablekb=1&loop=1&controls=0&fs=0&mute=1&rel=0"
        frameborder="0" allow="autoplay"
        style="border: solid 4px #37474F"
></iframe>
			</div>
			<div class="btn1">
				<button onClick="toggleImage();" id="button0" class="button button0">start</button>
				<button onClick="PlayVid();" class="button button1">play</button>
				<button onClick="PauseVid();" class="button button1">pause</button>
				<button onClick="StopVid();" class="button button3">stop</button>
			</div>
		</body>
		<script>
		  // Load the IFrame Player API code asynchronously.
  var tag = document.createElement('script');
  tag.src = "https://www.youtube.com/player_api";
  var firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  // Replace the 'ytplayer' element with an <iframe> and
  // YouTube player after the API code downloads.
  var player;
  function onYouTubeIframeAPIReady() {
    player = new YT.Player('ytvid', {
        events: {
          'onReady': onPlayerReady,
          'onStateChange': onPlayerStateChange
        }
    });
  }
  function onPlayerReady(event) {
  console.log('Ready');
  console.log(event);
  }
  function PlayVid() {
  player.playVideo();
  unMuteVid();
  }
  function PauseVid() {
  player.pauseVideo();
  }
  function StopVid() {
  player.stopVideo();
  }
  function unMuteVid() {
  setTimeout(function(){ player.unMute(); }, 1500);
  }
  document.querySelector('#ytvid').classList.toggle('hidden');
			function toggleImage(){
			document.querySelector('#image1').classList.toggle('hidden');
			document.querySelector('#ytvid').classList.toggle('hidden');
			PlayVid();
			}
			onYouTubeIframeAPIReady();
	function onPlayerStateChange(event) {
	console.log(event.data);
	var edt = event.data;
	console.log(edt);
	if (edt == 0) {
	$('#text1').html('<h1>Video Title</h1><br><h3>Video Author</h3>');
	document.querySelector('#image1').classList.toggle('hidden');
	document.querySelector('#ytvid').classList.toggle('hidden');
	} else if (edt == 5) {
	document.querySelector('#image1').classList.toggle('hidden');
	document.querySelector('#ytvid').classList.toggle('hidden');
		
	}
	}
			</script>
	</head>
</html>
