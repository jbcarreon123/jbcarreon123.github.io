<div id="page">

    <h1>:(</h1>
    <h2>Your site requested ran into a problem and needs to restart. We're just collecting some error info, and then we'll restart for
      you.</h2>
    <h2>
      <span id="percentage">0</span>% complete</h2>
    <script>
      var percentageElement = document.getElementById("percentage");
var percentage = 0;

function process() {
  percentage += parseInt(Math.random() * 10);
  if (percentage > 100) {
    percentage = 100;
    location.href = 'https://jbcarreon123.github.io';
  }
  percentageElement.innerText = percentage;
  processInterval();
}

function processInterval() {
  setTimeout(process, Math.random() * (1000 - 500) + 500)
}
processInterval();
    </script>
    <noscript>It looks like you have an browser that does not support JavaScript, or you disabled it.</noscript>
