<!DOCTYPE html>
<html>
    <head>
        <title>HTML WYSIWYG Editor</title>
        <style>
            .row {
                display: flex;
            }
            
            .column {
                flex: 50% !important;
                font-family: Geneva, Verdana, sans-serif;
                margin: 25px 25px 25px 25px;
                line-height: normal !important;
            }

            #inputbox, #iframe {
                width: 100%;
            }

            * {
                background-color: dimgray;
                color:azure;
            }

            iframe {
                background-color: white;
            }

            .welcome {
                text-align: center;
                line-height: 50%;   
            }

            .inputbox {
                font-size: 20px;
            }
        </style>
        <body>
            <div class="welcome"><h1>Welcome to the HTML What You See is What you Get editor!</h1><br>Made by Carreon, John Benedict B.</div>

            <div class="row">
                <div class="column">
                    <h2>Input</h2>
                    <textarea id="inputbox" oninput="oninp(this.value)"></textarea>
                </div>
                <div class="column">
                    <h2>Output</h2>
                    <iframe src="about:blank" id="iframe"></iframe>
                </div>
            </div>
        </body>
        <script>
            function oninp(value) {
                let iframe = document.getElementById('iframe')
                iframe.src = 'data:text/html;charset=utf-8,' + encodeURI(value);
            }

            function encodeURI(html) {
                html = html.replace("\r\n", "")
                html = html.replace("\n", "")
                return html
            }

            setInterval(function () {
                var viewport_width = window.innerHeight;
                document.getElementById('iframe').style = `height:${viewport_width}px;`
                document.getElementById('inputbox').style = `height:${viewport_width}px;`
            }, 50)
            
            document.getElementById('textbox').addEventListener('keydown', function(e) {
              if (e.key == 'Tab') {
                e.preventDefault();
                var start = this.selectionStart;
                var end = this.selectionEnd;

                // set textarea value to: text before caret + tab + text after caret
                this.value = this.value.substring(0, start) +
                  "\t" + this.value.substring(end);

                // put caret at right position again
                this.selectionStart =
                  this.selectionEnd = start + 1;
              }
            });
        </script>
    </head>
</html>
