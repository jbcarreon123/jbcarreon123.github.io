<!DOCTYPE html>
<html>
    <head>
        <title>HTML WYSIWYG Editor</title>
        <style>
            .row {
                display: flex;
            }
            
            .column {
                flex: 50% !important;
                font-family: Geneva, Verdana, sans-serif;
                margin: 25px 25px 25px 25px;
                line-height: normal !important;
            }

            #inputbox, #iframe {
                width: 100%;
            }

            * {
                background-color: dimgray;
                color:azure;
            }

            iframe {
                background-color: white;
            }

            .welcome {
                text-align: center;
                line-height: 50%;   
            }

            .inputbox {
                font-size: 20px;
            }
        </style>
        <body>
            <div class="welcome"><h1>Welcome to the HTML What You See is What you Get editor!</h1><br>Made by Carreon, John Benedict B.</div>

            <div class="row">
                <div class="column">
                    <h2>Input</h2><br><br><br>
                    <textarea id="inputbox" oninput="oninp(this.value)"></textarea>
                </div>
                <div class="column">
                    <h2>Output</h2>
					URL: <div id="param"></div><br>
                    <iframe src="about:blank" id="iframe"></iframe>
                </div>
            </div>
        </body>
        <script>
            function oninp(value) {
                let iframe = document.getElementById('iframe')
                iframe.src = 'data:text/html;charset=utf-8,' + encodeURI(value);
            }

            function encodeURI(html) {
                html = html.replace("\r\n", "")
                html = html.replace("\n", "")
                return html
            }

            setInterval(function () {
                var viewport_width = window.innerHeight;
                document.getElementById('iframe').style = `height:${viewport_width}px;`
                document.getElementById('inputbox').style = `height:${viewport_width}px;`
				document.getElementById('param').innerHTML = `<code>${escapeHTML(document.getElementById('iframe').src)}</code>`
            }, 50)
			
			var escape = document.createElement('textarea');
			function escapeHTML(html) {
				escape.textContent = html;
				return escape.innerHTML;
			}

			function unescapeHTML(html) {
				escape.innerHTML = html;
				return escape.textContent;
			}
        </script>
    </head>
</html>
