<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Open Graph Test Page">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.example.com/test-page">
  <meta property="og:image" content="https://www.example.com/images/test-image.jpg">
  <meta property="og:description" content="This is a test page for Open Graph meta tags.">
  <meta property="og:site_name" content="Example.com">
  <meta property="og:locale" content="en_US">
  <meta property="article:author" content="John Doe">
  <meta property="article:published_time" content="2023-12-05T12:00:00Z">
  <meta property="article:modified_time" content="2023-12-05T14:30:00Z">
  <meta property="og:see_also" content="https://www.example.com/related-page">
  
  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@example">
  <meta name="twitter:title" content="Twitter Test Page">
  <meta name="twitter:description" content="This is a test page for Twitter Card meta tags.">
  <meta name="twitter:image" content="https://www.example.com/images/test-image.jpg">

  <!-- Redirect Meta Tag -->
  <meta http-equiv="refresh" content="0;url=https://www.example.com">

  <!-- Other meta tags and stylesheets can be included here -->
  
  <title>Open Graph Test Page</title>
</head>
<body>
  <!-- Your webpage content goes here -->
</body>
</html>
